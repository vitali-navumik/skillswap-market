services:
  postgres:
    image: postgres:16-alpine
    container_name: skillswap-market-postgres
    environment:
      POSTGRES_DB: skillswap_market
      POSTGRES_USER: skillswap
      POSTGRES_PASSWORD: skillswap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillswap -d skillswap_market"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
