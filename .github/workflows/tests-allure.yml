name: Tests And Allure Report

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/tests-allure.yml'
      - 'tests-framework/**'
      - 'backend/**'
      - 'infra/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'settings.gradle'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/java:v1.54.0-noble

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: skillswap_market
          POSTGRES_USER: skillswap
          POSTGRES_PASSWORD: skillswap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skillswap -d skillswap_market"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_URL: jdbc:postgresql://postgres:5432/skillswap_market
      DB_USERNAME: skillswap
      DB_PASSWORD: skillswap
      JWT_SECRET: skillswap-market-demo-secret-key-that-must-be-long-enough-2026
      SERVER_PORT: 8080
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      API_URL: http://127.0.0.1:8080/api
      UI_BASE_URL: http://127.0.0.1:5173

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Prepare Maven cache
        run: mkdir -p ~/.m2/repository

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build backend jar
        working-directory: backend
        run: mvn -B -DskipTests package

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run dev -- --host 0.0.0.0 > frontend-ci.log 2> frontend-ci.err &

      - name: Start backend
        working-directory: backend
        run: |
          nohup java -jar target/skillswap-market-backend-0.0.1-SNAPSHOT.jar > backend-ci.log 2> backend-ci.err &

      - name: Wait for app services
        run: |
          wait_for() {
            name="$1"
            url="$2"
            attempts="$3"
            delay="$4"

            i=1
            while [ "$i" -le "$attempts" ]; do
              if node -e "fetch(process.argv[1]).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" "$url"; then
                echo "$name is ready"
                return 0
              fi
              echo "Waiting for $name... attempt $i/$attempts"
              i=$((i + 1))
              sleep "$delay"
            done

            echo "$name did not become ready in time"
            return 1
          }

          wait_for "backend" "http://127.0.0.1:8080/api/health" 30 5 || {
            echo "--- backend-ci.log ---"
            cat backend/backend-ci.log || true
            echo "--- backend-ci.err ---"
            cat backend/backend-ci.err || true
            exit 1
          }

          wait_for "frontend" "http://127.0.0.1:5173" 30 2 || {
            echo "--- frontend-ci.log ---"
            cat frontend/frontend-ci.log || true
            echo "--- frontend-ci.err ---"
            cat frontend/frontend-ci.err || true
            exit 1
          }

          echo "--- backend-ci.log ---"
          tail -n 80 backend/backend-ci.log || true
          echo "--- frontend-ci.log ---"
          tail -n 80 frontend/frontend-ci.log || true

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        id: tests
        run: |
          set +e
          ./gradlew :tests-framework:test --no-daemon
          exit_code=$?
          if [ "$exit_code" -ne 0 ]; then
            echo "TESTS_FAILED=true" >> "$GITHUB_ENV"
          else
            echo "TESTS_FAILED=false" >> "$GITHUB_ENV"
          fi
          exit 0

      - name: Build Allure report
        if: always()
        run: ./gradlew :tests-framework:allureReport -x :tests-framework:test --no-daemon

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results
          path: tests-framework/build/allure-results
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Allure HTML artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: tests-framework/build/reports/allure-report/allureReport
          if-no-files-found: warn
          retention-days: 30

      - name: Upload backend logs artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-logs
          path: |
            backend/backend-ci.log
            backend/backend-ci.err
          if-no-files-found: warn
          retention-days: 14

      - name: Upload frontend logs artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-logs
          path: |
            frontend/frontend-ci.log
            frontend/frontend-ci.err
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v5
        with:
          path: tests-framework/build/reports/allure-report/allureReport

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Fail workflow if tests failed
        if: always() && env.TESTS_FAILED == 'true'
        run: exit 1
