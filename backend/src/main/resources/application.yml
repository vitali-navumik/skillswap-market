spring:
  application:
    name: skillswap-market-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/skillswap_market}
    username: ${DB_USERNAME:skillswap}
    password: ${DB_PASSWORD:skillswap}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:skillswap-market-demo-secret-key-that-must-be-long-enough-2026}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    org.springframework.security: INFO
